<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Thiệp Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:'Segoe UI', Arial;  
font-size: 18px;

overflow:hidden;
text-align:center;
color:white;
}

/* khung thiệp */

.card{
background:rgba(255,255,255,0.2);
padding: 100px;
border-radius: 50px;
backdrop-filter:blur(8px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:350px;
}

/* button */

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#ff1e4d;
}

/* tim bay */

.heart{
position:absolute;
font-size:25px;
animation:heartFly linear infinite;
}

@keyframes heartFly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* hoa rơi */

.flower{
position:absolute;
font-size:22px;
animation:flowerFall linear infinite;
}

@keyframes flowerFall{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<!-- Trang 1 -->

<div id="trang1" class="card">

<h1>💐 Chúc mừng 8/3 💐</h1>

<p>Bấm nút dưới để mở thiệp</p>

<button onclick="moThiep()">Mở thiệp 💌</button>

</div>

<!-- Trang 2 -->

<div id="trang2" class="card" style="display:none;">

<h1>💌 Lời Chúc</h1>

<p>
Chúc mẹ và tất cả phụ nữ trong gia đình  
luôn mạnh khỏe, hạnh phúc và luôn xinh đẹp ❤️
</p>

<p>
Cảm ơn vì đã luôn yêu thương và chăm sóc gia đình.  
Chúc một ngày 8/3 thật ý nghĩa 🌸
</p>

</div>

<script>

/* mở thiệp */

function moThiep(){
document.getElementById("trang1").style.display="none";
document.getElementById("trang2").style.display="block";
}

/* tim bay */

function taoTim(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*3+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(taoTim,500);

/* hoa rơi */

function taoHoa(){
const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},8000);
}

setInterval(taoHoa,700);

</script>

</body>
</html>
