<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp Chúc Mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffecd2);
font-family:'Poppins',sans-serif;
overflow:hidden;
text-align:center;
}

/* phong bi */

.envelope{
background:white;
padding:50px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
width:90%;
max-width:500px;
transition:0.6s;
}

.envelope.hide{
opacity:0;
transform:scale(0.2) rotateY(90deg);
}

.envelope h1{
font-family:'Dancing Script';
font-size:45px;
color:#ff4d6d;
}

.envelope p{
font-size:18px;
color:#555;
}

/* button */

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1e4d;
}

/* card */

.card{
display:none;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);
padding:60px;
border-radius:25px;
width:100%;
max-width:700px;
color:white;
opacity:0;
transform:scale(0.3);
transition:0.8s;

}

.card.show{
display:block;
opacity:1;
transform:scale(1);
}

.card h1{
font-family:'Dancing Script';
font-size:55px;
}

.card p{
font-size:22px;
line-height:1.8;
}

/* hearts */

.heart{
position:absolute;
font-size:25px;
animation:heartFly linear infinite;
}

@keyframes heartFly{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* flower */

.flower{
position:absolute;
font-size:24px;
animation:flowerFall linear infinite;
}

@keyframes flowerFall{
0%{transform:translateY(-10vh) rotate(0);}
100%{transform:translateY(100vh) rotate(360deg);}
}

/* sparkle */

.sparkle{
position:absolute;
font-size:20px;
animation:sparkle 1.5s forwards;
}

@keyframes sparkle{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-80px);}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 3s forwards;
}

@keyframes fall{
to{transform:translateY(100vh) rotate(360deg); opacity:0;}
}


</style>
</head>

<body>

<div id="phongbi" class="envelope">
<h1>💌 Bạn có một thiệp 8/3</h1>
<p>Bấm nút để mở</p>
<button onclick="moThiep()">Mở Thiệp</button>
</div>

<div id="thiep" class="card">
<h1>💐 Chúc Mừng 8/3 💐</h1>

<p>
Chúc mẹ và tất cả phụ nữ trong gia đình<br>
luôn mạnh khỏe, hạnh phúc và xinh đẹp ❤️
</p>

<p>
Cảm ơn vì đã luôn yêu thương<br>
và chăm sóc gia đình 🌸
</p>

<button onclick="closeCard()">Đóng Lại</button>
</div>



<script>

/* mở thiệp */

function moThiep(){

const phongbi=document.getElementById("phongbi");
const thiep=document.getElementById("thiep");

taoSparkle(30);
taoConfetti(50);

phongbi.classList.add("hide");

setTimeout(()=>{
phongbi.style.display="none";
thiep.style.display="block"; 
thiep.classList.add("show");
},600)

}

/* đóng thiệp */

function closeCard(){

const phongbi=document.getElementById("phongbi");
const thiep=document.getElementById("thiep");

thiep.classList.remove("show");

setTimeout(()=>{
thiep.style.display="none";
phongbi.style.display="block";
phongbi.classList.remove("hide");
},600)

}

/* tim bay */

function taoTim(){

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(taoTim,700);

/* hoa roi */

function taoHoa(){

const flower=document.createElement("div");

flower.className="flower";
flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(flower);

setTimeout(()=>flower.remove(),8000);

}

setInterval(taoHoa,900);

/* sparkle */

function taoSparkle(count){

for(let i=0;i<count;i++){

const s=document.createElement("div");

s.className="sparkle";
s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1500)

}

}

/* confetti */

function taoConfetti(count){

const colors=["#ff4d6d","#ffd60a","#06d6a0","#118ab2"];

for(let i=0;i<count;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.left=Math.random()*100+"vw";
c.style.top="-10px";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000)

}

}






</script>

</body>
</html>
